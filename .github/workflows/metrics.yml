name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:          # Manual trigger
  push:
    branches: ["main", "master"]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------
      # General stats + languages (left card equivalent)
      # Requires: METRICS_TOKEN secret (PAT with public_repo scope)
      # Settings → Secrets and variables → Actions → New repository secret
      # -----------------------------------------------------------------
      - name: Stats & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-stats.svg
          base: header, repositories
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          config_timezone: Europe/Paris
          config_display: columns

      # -----------------------------------------------------------------
      # Contribution calendar (streak equivalent)
      # -----------------------------------------------------------------
      - name: Activity Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Paris
